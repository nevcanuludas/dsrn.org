<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DSRN - Technical Diving Comparison</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    h1 { margin-bottom: 5px; }
    .filters { margin-bottom: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    th { background: #f5f5f5; }
    .tag { background: #e0e0e0; padding: 3px 6px; margin-right: 5px; border-radius: 4px; }
  </style>
</head>
<body>

<h1>Technical Diving Courses</h1>
<p>Compare training standards across organizations</p>

<div class="filters">
  <strong>Filter by Tags:</strong><br/>
  <label><input type="checkbox" value="Trimix" onchange="filterCourses()"> Trimix</label>
  <label><input type="checkbox" value="Cave" onchange="filterCourses()"> Cave</label>
  <label><input type="checkbox" value="CCR" onchange="filterCourses()"> CCR</label>
</div>

<table id="courseTable">
  <thead>
    <tr>
      <th>Organization</th>
      <th>Course</th>
      <th>Depth</th>
      <th>Prerequisites</th>
      <th>Tags</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const courses = [
  {
    org: "GUE",
    name: "Tech Fundamentals",
    depth: "n/a",
    prereq: "...",
    tags: []
  },
  {
    org: "GUE",
    name: "Tech 1",
    depth: "51m",
    prereq: "GUE Fundamentals",
    tags: ["Trimix", "Decompression"]
  },
  {
    org: "GUE",
    name: "Tech 2",
    depth: "75m",
    prereq: "GUE Tech 1",
    tags: ["Trimix", "Decompression"]
  },
  {
    org: "GUE",
    name: "PSCR",
    depth: "n/a",
    prereq: "GUE Tech 2",
    tags: ["SCR", "Trimix", "Decompression"]
  },
  {
    org: "GUE",
    name: "Tech 3",
    depth: "120m",
    prereq: "GUE CCR 2",
    tags: ["CCR", "Trimix", "Decompression"]
  },
  {
    org: "GUE",
    name: "CCR Fundamentals - JJ",
    depth: "30m",
    prereq: "GUE Fundamentals",
    tags: ["CCR"]
  },
  {
    org: "GUE",
    name: "CCR Fundamentals - Symbios",
    depth: "30m",
    prereq: "GUE Fundamentals",
    tags: ["CCR"]
  },
  {
    org: "GUE",
    name: "CCR T1",
    depth: "51m",
    prereq: "GUE CCR Fundamentals",
    tags: ["CCR", "Trimix", "Decompression"]
  },
  {
    org: "GUE",
    name: "CCR T2",
    depth: "75m",
    prereq: "GUE CCR T1",
    tags: ["CCR", "Trimix", "Decompression"]
  },
  {
    org: "TDI",
    name: "Advanced Trimix",
    depth: "100m",
    prereq: "Normoxic Trimix",
    tags: ["Trimix", "Decompression"]
  },
  {
    org: "GUE",
    name: "Cave 2",
    depth: "Advanced Cave",
    prereq: "Cave 1",
    tags: ["Cave", "Trimix"]
  },
  {
    org: "TDI",
    name: "CCR Helitrox",
    depth: "45m",
    prereq: "CCR Diver",
    tags: ["CCR", "Trimix"]
  }
];

function renderTable(filtered) {
  const tbody = document.querySelector("#courseTable tbody");
  tbody.innerHTML = "";

  filtered.forEach(c => {
    const row = `<tr>
      <td>${c.org}</td>
      <td>${c.name}</td>
      <td>${c.depth}</td>
      <td>${c.prereq}</td>
      <td>${c.tags.map(t => `<span class="tag">${t}</span>`).join("")}</td>
    </tr>`;
    tbody.innerHTML += row;
  });
}

function filterCourses() {
  const checked = Array.from(document.querySelectorAll("input[type=checkbox]:checked"))
    .map(cb => cb.value);

  if (checked.length === 0) {
    renderTable(courses);
    return;
  }

  const filtered = courses.filter(c =>
    checked.every(tag => c.tags.includes(tag))
  );

  renderTable(filtered);
}

// initial render
renderTable(courses);
</script>

</body>
</html>
